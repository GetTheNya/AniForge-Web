<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AniForge Web</title>
    <script type="text/javascript">
      var pathSegmentsToKeep = 1; 

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?_p=' +
        encodeURIComponent(l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/')) +
        (l.search ? '&_q=' + encodeURIComponent(l.search.slice(1)) : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
